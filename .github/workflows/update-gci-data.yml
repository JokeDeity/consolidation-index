name: Update GCI Data

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: gci-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Generate GCI datasets
        run: node scripts/update-gci-data.mjs

      - name: Commit updated data
        run: |
          git add data/latest.json data/history.json data/feed.json data/state.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): update GCI datasets"
          git pull --rebase origin main
          git push
